<!DOCTYPE>
<html>
    <h1>BIG BOY HARDWARE PTY(LTD)</h1>
    <img src="big bro logo.png" width="300" height="200">
    <h2>Job Application Form</h2>
    <head>
        
      <title>BIG BOY HARDWARE</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
        <link rel="stylesheet" href="styles.css">
    </head>
        <body>
    <form>
        <form name="myForm" onsubmit="return validateForm()">
        <div>
      <legend>Contact Info</legend>
        </div>
        
            <div class="mb-3">
            <label class="form-label">Username:</label>
          <input type="username" class="form-control">
            </div>
      <br>
        <div class="mb-3">
             <label class="form-label">Email address:</label>
            <input type="email" class="form-control">
            </div>
        <div class="mb-3">
            <label class="form-label">Password:</label>
            <input type="password" class="form-control">
        </div>
        
        <div class="mb-3">
            <label class="form-label">Telephone:</label>
            <input type="telephone" class="form-control">
            </div>
        <br>
        
            <div>
                <br>
        Gender:
                </div>
            <br>
            <div>
        Male: <input type="radio" name="gender" value="Male">
                </div>
            <br>
            <div>
                     Female: <input type="radio" name="gender" value="Female">
                </div>
            <br>
            
            Other: <input type="radio" name="gender" value="Other">
            <br>
       
          <h3> Tick From The Following Job positions</h3>
        
        <input type="checkbox"name="job" value="Account Executive">Account Executive
        <br>
            <input type="checkbox"name="job" value="Business Development">Business Development
            <br>
            <input type="checkbox"name="job" value="Inside Sales">Inside Sales
            <br>
            <input type="checkbox" name="job" value="Sales Manager">Sales Manager
            <br>
            <input type="checkbox" name="job" value="VP Sales">VP Sales
            <br>
        <div>
           <h3> Please Select Type Of Position</h3> 
        </div>
        <br>
      
       <label for="position">Type Of Position:</label>
        <select id="position"name="position">
            <option value="fulltime">Full Time</option>
            <option value="parttime">Part Time</option>
            <option value="internship">Internship</option>
            <option value="contract">Contract</option>
        </select>
            <br>
        <div>
            <p>Willing to relocate?</p>
            <input type="radio" id="yes" name="relocate" value="yes">
            <label for="yes">Yes</label>
            <input type="radio" id="no" name="relocate" value="no">
            <label for="no">No</label>
        </div>
                <br>
        <script>
            function validateForm(){
                let name = document.forms["myForm"]["username"].value;

                if(name ==""){
                            alert("Name must be filled out");
                                        return false;
                }
            }
            
                </script>
            <div class="mb-3">
                <label class="form-label">Why are you suitable for this role?</label>
                <textarea class="form-control" rows="4"></textarea>
            </div>
            <br>
         <div>
          <input type="submit" value="Submit">
              <input type="reset" value="Reset">
              </div>
            <br>
        
        </form>

        </body>
</html>
